<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>EletivaBank - Sistema Completo</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        .box { border: 2px solid #17a2b8; padding: 15px; border-radius: 8px; background: white; margin-bottom: 20px; width: 350px; display: none; }
        input { display: block; width: 90%; margin: 5px auto; padding: 8px; }
        button { background-color: #17a2b8; color: white; border: none; padding: 10px; margin: 5px; cursor: pointer; border-radius: 4px; }
        table { width: 100%; max-width: 1050px; border-collapse: collapse; background: white; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #17a2b8; color: white; }
        #painel { width: 100%; display: none; }
        #login { background: white; padding: 30px; border-radius: 10px; border: 1px solid #ddd; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .info-rendimento { background: #d4edda; color: #155724; padding: 10px; border-radius: 5px; margin-bottom: 15px; border: 1px solid #c3e6cb; }
        #busca { width: 100%; max-width: 350px; padding: 10px; margin-bottom: 15px; border: 2px solid #17a2b8; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="login">
        <h2>EletivaBank - Admin</h2>
        <input type="password" id="senha" placeholder="Senha">
        <button onclick="acessar()">Entrar</button>
    </div>

    <div id="painel">
        <h2>Painel de Controle</h2>
        <div class="info-rendimento" id="bannerTaxa">📈 Carregando...</div>
        
        <input type="text" id="busca" placeholder="🔍 Localizar aluno..." onkeyup="filtrarTabela()">
        
        <button onclick="document.getElementById('form').style.display='block'">+ Cadastrar Aluno</button>
        <button onclick="document.getElementById('formCSV').style.display='block'" style="background-color: #6f42c1;">📂 Importar CSV</button>
        <button onclick="document.getElementById('relatorioBox').style.display='block'" style="background-color: #28a745;">📊 Relatório PIX</button>
        
        <div id="relatorioBox" class="box">
            <h4>Exportar Transações (Raiz)</h4>
            <input type="date" id="dataInicio">
            <input type="date" id="dataFim">
            <button onclick="gerarRelatorio()" style="background-color: #28a745;">Baixar CSV (Excel)</button>
        </div>

        <div id="formCSV" class="box">
            <h4>Importar CSV (Conta,Dig,Nome,Senha,Saldo)</h4>
            <input type="file" id="csvFile" accept=".csv">
            <button onclick="importarCSV()" style="background-color: #6f42c1;">Processar</button>
        </div>

        <div id="form" class="box">
            <input type="text" id="conta" placeholder="Conta">
            <input type="text" id="digito" placeholder="Dígito">
            <input type="text" id="nome" placeholder="Nome">
            <input type="text" id="senhaC" placeholder="Senha">
            <input type="number" id="saldo" placeholder="Saldo Inicial">
            <button onclick="salvarAluno()">Gravar</button>
        </div>

        <table>
            <thead><tr><th>Nome</th><th>Conta</th><th>Saldo</th><th>Poupança</th><th>Senha</th><th>Ações</th></tr></thead>
            <tbody id="tabela"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, getDocs, onSnapshot, updateDoc, deleteDoc, getDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const db = getFirestore(initializeApp({ apiKey: "AIzaSyCG_jh9lDlTj8mAKKm6sYhI9XNSP_OLjFY", authDomain: "banco-sandra.firebaseapp.com", projectId: "banco-sandra", storageBucket: "banco-sandra.firebasestorage.app", messagingSenderId: "506761695598", appId: "1:506761695598:web:783a6bfa6d5ff0b143317f" }));

        window.acessar = () => { 
            if(document.getElementById('senha').value === "1506") { 
                document.getElementById('login').style.display='none'; 
                document.getElementById('painel').style.display='block'; 
                iniciarMonitoramento(); carregarTaxa();
            } else alert("Senha incorreta!"); 
        };

        window.gerarRelatorio = async () => {
            const inicio = document.getElementById('dataInicio').value;
            const fim = document.getElementById('dataFim').value;
            if(!inicio || !fim) return alert("Selecione o intervalo!");
            
            const dataInicio = new Date(inicio + "T00:00:00");
            const dataFim = new Date(fim + "T23:59:59");
            
            let csv = "Data;Hora;Remetente;Observação;Valor;Destinatário\n";
            let achou = false;
            
            const usuariosSnap = await getDocs(collection(db, "usuarios"));
            const mapa = {};
            usuariosSnap.forEach(d => mapa[d.id] = d.data().nome);
            
            const transSnap = await getDocs(collection(db, "transacoes"));
            transSnap.forEach(t => {
                const d = t.data();
                if (d.data && d.data.toDate) {
                    const dataTrans = d.data.toDate();
                    if(dataTrans >= dataInicio && dataTrans <= dataFim) {
                        const remetente = mapa[d.origem] || d.origem || "Desconhecido";
                        const destino = d.nomeDestino || "N/A";
                        const observacao = d.obs || "";
                        
                        csv += `${dataTrans.toLocaleDateString('pt-BR')};${dataTrans.toLocaleTimeString('pt-BR')};${remetente};${destino};${d.valor||0};${observacao}\n`;
                        achou = true;
                    }
                }
            });
            
            if(!achou) return alert("Nenhuma transação encontrada.");
            const blob = new Blob(['\ufeff', csv], {type: 'text/csv;charset=utf-8;'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'relatorio_pix.csv'; a.click();
        };

        window.ajustarSaldo = async (id, saldoAtual) => {
            const v = parseFloat(prompt("Valor (+ ou -):"));
            if (isNaN(v)) return;
            const motivo = prompt("Motivo:");
            await updateDoc(doc(db, "usuarios", id), { saldo: saldoAtual + v });
            await addDoc(collection(db, "transacoes"), { origem: "ADMIN", nomeDestino: id, valor: v, obs: motivo || "Ajuste", data: serverTimestamp() });
        };

        window.filtrarTabela = () => {
            const t = document.getElementById('busca').value.toLowerCase();
            document.querySelectorAll('#tabela tr').forEach(l => l.style.display = l.innerText.toLowerCase().includes(t) ? '' : 'none');
        };

        function iniciarMonitoramento() {
            onSnapshot(collection(db, "usuarios"), (snap) => {
                const tbody = document.getElementById('tabela'); tbody.innerHTML = '';
                snap.forEach(d => {
                    const u = d.data();
                    tbody.innerHTML += `<tr>
                        <td>${u.nome} <button onclick="editarNome('${d.id}')">✎</button></td>
                        <td>${d.id}</td>
                        <td>M$ ${parseFloat(u.saldo||0).toFixed(2)}</td>
                        <td>M$ ${parseFloat(u.poupanca||0).toFixed(2)}</td>
                        <td><input type="password" id="pass-${d.id}" value="${u.senha}" readonly style="width:60px"><button onclick="toggleSenha('${d.id}')">👁</button></td>
                        <td><button onclick="ajustarSaldo('${d.id}', ${u.saldo||0})" style="background:#17a2b8">+/-</button> <button onclick="excluir('${d.id}')" style="background:#dc3545">X</button></td>
                    </tr>`;
                });
            });
        }

        window.editarNome = async (id) => { const n = prompt("Novo nome:"); if(n) await updateDoc(doc(db, "usuarios", id), { nome: n }); };
        window.toggleSenha = (id) => { const el = document.getElementById('pass-'+id); el.type = el.type === 'password' ? 'text' : 'password'; };
        async function carregarTaxa() { const snap = await getDoc(doc(db, "config", "taxas")); document.getElementById('bannerTaxa').innerText = snap.exists() ? `📈 Poupança: ${snap.data().descricao}` : "📈 Taxa não configurada."; }
        window.salvarAluno = async () => { const id = document.getElementById('conta').value + "-" + document.getElementById('digito').value; await setDoc(doc(db, "usuarios", id), { nome: document.getElementById('nome').value, senha: document.getElementById('senhaC').value, saldo: parseFloat(document.getElementById('saldo').value), poupanca: 0 }); alert("Gravado!"); };
        window.excluir = async (id) => { if(confirm("Eliminar?")) await deleteDoc(doc(db, "usuarios", id)); };
        
        window.importarCSV = () => {
            const file = document.getElementById('csvFile').files[0];
            if (!file) return alert("Selecione um arquivo CSV primeiro!");
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                const text = e.target.result;
                const lines = text.split('\n');
                let processados = 0;

                for (let line of lines) {
                    const cleanLine = line.trim();
                    if (!cleanLine) continue;

                    // Detecta se o separador é vírgula ou ponto e vírgula
                    const separador = cleanLine.includes(';') ? ';' : ',';
                    const colunas = cleanLine.split(separador);

                    // Garante que temos as 5 colunas: Conta, Digito, Nome, Senha, Saldo
                    if (colunas.length >= 5) {
                        const [conta, digito, nome, senha, saldo] = colunas.map(c => c.trim());
                        
                        // ID é a combinação de conta e digito
                        const id = `${conta}-${digito}`;
                        
                        try {
                            await setDoc(doc(db, "usuarios", id), { 
                                nome: nome, 
                                senha: senha, 
                                saldo: parseFloat(saldo) || 0, 
                                poupanca: 0 
                            });
                            processados++;
                        } catch (err) {
                            console.error("Erro ao salvar linha:", cleanLine, err);
                        }
                    }
                }
                alert(`Sucesso! ${processados} alunos foram importados.`);
                document.getElementById('formCSV').style.display = 'none';
            };
            reader.readAsText(file);
        };
    </script>
</body>
</html>
