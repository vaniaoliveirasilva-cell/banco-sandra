<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ADM - Banco VaniaCoin</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; }
        .box { border: 2px solid #28a745; padding: 15px; border-radius: 8px; background: white; margin-bottom: 20px; display: none; width: 300px; }
        input { display: block; width: 90%; margin: 5px auto; padding: 8px; }
        button { background-color: #28a745; color: white; border: none; padding: 10px; margin: 5px; cursor: pointer; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #28a745; color: white; }
    </style>
</head>
<body>

    <div id="login" style="text-align:center; margin-top:50px;">
        <h2>Acesso Administrativo</h2>
        <input type="password" id="senha" placeholder="Senha">
        <button onclick="acessar()">Entrar</button>
    </div>

    <div id="painel" style="display:none;">
        <h2>Painel de Controle VaniaCoin</h2>
        <button onclick="document.getElementById('form').style.display='block'">+ Cadastrar Aluno</button>
        <button style="background-color: #ffc107; color: black;" onclick="exportarCSV()">📥 Exportar Movimentações (CSV)</button>
        
        <div id="form" class="box">
            <input type="text" id="conta" placeholder="Conta (9 dígitos)">
            <input type="text" id="digito" placeholder="Dígito">
            <input type="text" id="nome" placeholder="Nome">
            <input type="text" id="senhaC" placeholder="Senha">
            <input type="number" id="saldo" placeholder="Saldo Inicial">
            <button onclick="salvarAluno()">Salvar Aluno</button>
        </div>

        <table>
            <thead><tr><th>Conta-DV</th><th>Nome</th><th>Saldo</th><th>Ações</th></tr></thead>
            <tbody id="tabela"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDocs, collection, deleteDoc, runTransaction } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const db = getFirestore(initializeApp({ apiKey: "AIzaSyCG_jh9lDlTj8mAKKm6sYhI9XNSP_OLjFY", authDomain: "banco-sandra.firebaseapp.com", projectId: "banco-sandra", storageBucket: "banco-sandra.firebasestorage.app", messagingSenderId: "506761695598", appId: "1:506761695598:web:783a6bfa6d5ff0b143317f", measurementId: "G-LXY6D6EQ0Q" }));

        window.acessar = () => { if(document.getElementById('senha').value === "9844") { document.getElementById('login').style.display='none'; document.getElementById('painel').style.display='block'; listar(); } };

        window.listar = async () => {
            const snap = await getDocs(collection(db, "usuarios"));
            const tbody = document.getElementById('tabela');
            tbody.innerHTML = '';
            snap.forEach(d => {
                const u = d.data();
                tbody.innerHTML += `<tr><td>${d.id}</td><td>${u.nome}</td><td>R$ ${Number(u.saldo).toFixed(2)}</td>
                <td><button onclick="ajustar('${d.id}', ${u.saldo})">+/- Saldo</button>
                <button onclick="excluir('${d.id}')">Excluir</button></td></tr>`;
            });
        };

        window.salvarAluno = async () => {
            const id = document.getElementById('conta').value + "-" + document.getElementById('digito').value;
            await setDoc(doc(db, "usuarios", id), { nome: document.getElementById('nome').value, senha: document.getElementById('senhaC').value, saldo: parseFloat(document.getElementById('saldo').value) });
            listar();
        };

        window.ajustar = async (id, saldoAtual) => {
            const valor = parseFloat(prompt("Valor (use negativo para retirar):"));
            if(!isNaN(valor)) {
                await runTransaction(db, async (t) => {
                    t.update(doc(db, "usuarios", id), { saldo: saldoAtual + valor });
                    t.set(doc(collection(db, "transacoes")), { origem: "ADMIN", destino: id, valor, data: new Date() });
                });
                listar();
            }
        };

        window.exportarCSV = async () => {
            const snap = await getDocs(collection(db, "transacoes"));
            let csv = "Origem;Destino;Valor;Data\n";
            snap.forEach(d => { const t = d.data(); csv += `${t.origem};${t.destino};${t.valor};${t.data.toDate().toLocaleString()}\n`; });
            const blob = new Blob([csv], {type: 'text/csv'});
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "movimentacoes.csv";
            link.click();
        };

        window.excluir = async (id) => { await deleteDoc(doc(db, "usuarios", id)); listar(); };
    </script>
</body>
</html>
