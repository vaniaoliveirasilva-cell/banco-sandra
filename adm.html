<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Administração - Banco VaniaCoin</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; }
        .box { border: 2px solid #28a745; padding: 20px; border-radius: 8px; width: 400px; background: white; margin-bottom: 20px; display: none; }
        input { display: block; width: 90%; margin: 10px auto; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #28a745; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; width: 95%; margin: 5px; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #28a745; color: white; }
    </style>
</head>
<body>
    <div id="loginAdmin" style="text-align: center; margin-top: 50px;">
        <h2>Acesso Administrativo</h2>
        <input type="password" id="senhaAdm" placeholder="Senha">
        <button id="btnAcessar">Entrar</button>
    </div>

    <div id="painel" style="display: none;">
        <h2>Painel de Controle</h2>
        <button id="btnAbrirCadastro">+ Cadastrar Aluno</button>
        <button id="btnExportar" style="background-color: #ffc107; color: black;">📥 Exportar Extrato</button>
        
        <div id="formCadastro" class="box">
            <input type="text" id="novoConta" placeholder="Conta">
            <input type="text" id="novoDigito" placeholder="Dígito">
            <input type="text" id="novoNome" placeholder="Nome">
            <input type="text" id="novaSenha" placeholder="Senha">
            <input type="number" id="novoSaldo" placeholder="Saldo Inicial">
            <button id="btnSalvar">Salvar</button>
        </div>
        <table><thead><tr><th>Conta</th><th>Nome</th><th>Saldo</th><th>Ações</th></tr></thead><tbody id="tabelaUsuarios"></tbody></table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDocs, collection, runTransaction } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCG_jh9lDlTj8mAKKm6sYhI9XNSP_OLjFY", authDomain: "banco-sandra.firebaseapp.com", projectId: "banco-sandra", storageBucket: "banco-sandra.firebasestorage.app", messagingSenderId: "506761695598", appId: "1:506761695598:web:783a6bfa6d5ff0b143317f" };
        const db = getFirestore(initializeApp(firebaseConfig));

        document.getElementById('btnAcessar').onclick = () => {
            if(document.getElementById('senhaAdm').value === "9844") {
                document.getElementById('loginAdmin').style.display = 'none';
                document.getElementById('painel').style.display = 'block';
                listar();
            } else alert("Senha incorreta!");
        };

        async function listar() {
            const snap = await getDocs(collection(db, "usuarios"));
            const tbody = document.getElementById('tabelaUsuarios');
            tbody.innerHTML = '';
            snap.forEach(d => {
                const u = d.data();
                tbody.innerHTML += `<tr><td>${d.id}</td><td>${u.nome}</td><td>${u.saldo}</td><td><button onclick="excluir('${d.id}')">Excluir</button></td></tr>`;
            });
        }
        
        window.excluir = async (id) => { await runTransaction(db, async (t) => { t.delete(doc(db, "usuarios", id)); }); listar(); };
        document.getElementById('btnSalvar').onclick = async () => {
            const id = document.getElementById('novoConta').value + "-" + document.getElementById('novoDigito').value;
            await setDoc(doc(db, "usuarios", id), { nome: document.getElementById('novoNome').value, senha: document.getElementById('novaSenha').value, saldo: parseFloat(document.getElementById('novoSaldo').value) });
            listar();
        };
        document.getElementById('btnAbrirCadastro').onclick = () => document.getElementById('formCadastro').style.display = 'block';
    </script>
</body>
</html>
