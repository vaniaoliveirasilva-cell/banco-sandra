<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Banco VaniaCoin</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; text-align: center; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        input { width: 90%; padding: 10px; margin: 5px; }
        button { width: 90%; padding: 10px; background: #28a745; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container" id="loginBox">
        <h2>Login VaniaCoin</h2>
        <input type="text" id="inputConta" placeholder="Conta">
        <input type="text" id="inputDigito" placeholder="Dígito">
        <input type="password" id="inputSenha" placeholder="Senha">
        <button onclick="fazerLogin()">Entrar</button>
    </div>
    <div class="container" id="areaAluno" style="display:none;">
        <h2>Olá, <span id="nomeUser"></span></h2>
        <h3>Saldo: R$ <span id="saldoUser"></span></h3>
        <button onclick="window.location.reload()">Sair</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const db = getFirestore(initializeApp({ apiKey: "AIzaSyCG_jh9lDlTj8mAKKm6sYhI9XNSP_OLjFY", authDomain: "banco-sandra.firebaseapp.com", projectId: "banco-sandra", storageBucket: "banco-sandra.firebasestorage.app", messagingSenderId: "506761695598", appId: "1:506761695598:web:783a6bfa6d5ff0b143317f" }));

        window.fazerLogin = async () => {
            const id = document.getElementById('inputConta').value + "-" + document.getElementById('inputDigito').value;
            const senha = document.getElementById('inputSenha').value;
            const docSnap = await getDoc(doc(db, "usuarios", id));
            if (docSnap.exists() && docSnap.data().senha === senha) {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('areaAluno').style.display = 'block';
                document.getElementById('nomeUser').innerText = docSnap.data().nome;
                document.getElementById('saldoUser').innerText = docSnap.data().saldo;
            } else alert("Dados incorretos!");
        };
    </script>
</body>
</html>
